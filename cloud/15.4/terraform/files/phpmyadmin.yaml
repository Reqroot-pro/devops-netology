apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpmyadmin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phpmyadmin
  template:
    metadata:
      labels:
        app: phpmyadmin
    spec:
      containers:
      - name: phpmyadmin
        image: phpmyadmin/phpmyadmin:5.2
        ports:
        - containerPort: 80
        env:
        - name: PMA_HOST
          value: "rc1a-et33e40iadlml364.mdb.yandexcloud.net"
        - name: PMA_PORT
          value: "3306"
        - name: PMA_USER
          value: "netology_user"
        - name: PMA_PASSWORD
          value: "MySecurePass2026!"
---
apiVersion: v1
kind: Service
metadata:
  name: phpmyadmin-lb
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: phpmyadmin