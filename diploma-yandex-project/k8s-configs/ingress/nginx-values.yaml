controller:
  replicaCount: 2
  
  service:
    type: LoadBalancer
    externalTrafficPolicy: Local
    annotations:
      service.beta.kubernetes.io/yc-load-balancer-type: "external"
      service.beta.kubernetes.io/yc-load-balancer-ipv4-address-type: "ipv4"
  
  resources:
    requests:
      cpu: 100m
      memory: 90Mi
    limits:
      cpu: 250m
      memory: 256Mi

  config:
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    proxy-buffer-size: "16k"
  
  admissionWebhooks:
    enabled: false
  
  # Публикуем только порт 80 для демо (443 можно добавить позже)
  publishService:
    enabled: true