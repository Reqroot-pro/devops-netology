controller:
  replicaCount: 2
  service:
    type: LoadBalancer
    annotations:
      yc.cni.yandex.io/lb-type: external
  resources:
    requests:
      cpu: 100m
      memory: 90Mi
    limits:
      cpu: 250m
      memory: 256Mi
  config:
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"