# Grafana настройки (доступ по HTTP 80)
grafana:
  enabled: true
  adminPassword: "admin123"
  
  # Сервис
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  
  ingress:
    enabled: true
    ingressClassName: "ingress-nginx"
    
    # Аннотации для Яндекс.Облака + Nginx
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
      nginx.ingress.kubernetes.io/ssl-redirect: "false"  # ← Отключаем HTTPS-редирект для демо
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    
    # Хосты
    hosts:
      - grafana.local
    
    # Путь
    path: /
    pathType: Prefix
    
    # Явно указываем порт сервиса
    servicePort: 80
    
    # TLS (опционально, для продакшена)
    # tls:
    #   - secretName: grafana-tls
    #     hosts:
    #       - grafana.local

# Prometheus настройки
prometheus:
  enabled: true
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        memory: 512Mi
        cpu: 500m
      limits:
        memory: 2Gi
        cpu: 1000m

# Alertmanager
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        memory: 128Mi
        cpu: 100m

# Node Exporter для метрик нод
prometheus-node-exporter:
  enabled: true

# Kube-state-metrics для метрик кластера
kube-state-metrics:
  enabled: true