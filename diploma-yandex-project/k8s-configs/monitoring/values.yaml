# Grafana настройки (доступ по HTTP 80)
grafana:
  enabled: true
  adminPassword: "admin123"
  
  # Сервис
  service:
    type: ClusterIP
    port: 80
  
  # Ingress — ВАЖНО: точная структура для этого чарта
  ingress:
    enabled: true
    ingressClassName: "ingress-nginx"
    
    # Аннотации
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
    
    # Хосты
    hosts:
      - grafana.local
    # Путь
    path: /
    pathType: Prefix
    
    # TLS (если понадобится)
    # tls:
    #   - secretName: grafana-tls
    #     hosts:
    #       - grafana.local

# Prometheus настройки
prometheus:
  enabled: true
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        memory: 512Mi
        cpu: 500m
      limits:
        memory: 2Gi
        cpu: 1000m

# Alertmanager
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        memory: 128Mi
        cpu: 100m

# Node Exporter для метрик нод
prometheus-node-exporter:
  enabled: true

# Kube-state-metrics для метрик кластера
kube-state-metrics:
  enabled: true