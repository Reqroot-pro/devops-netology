# Grafana настройки (доступ по HTTP 80)
grafana:
  enabled: true
  adminPassword: "admin123"
  
  # Сервис
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000

  env:
    GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
    GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    GF_SERVER_HTTP_PORT: "80"
  
  ingress:
    enabled: true
    ingressClassName: "nginx"
    
    # Аннотации для Яндекс.Облака + Nginx
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /$2
      nginx.ingress.kubernetes.io/ssl-redirect: "false"  # ← Отключаем HTTPS-редирект для демо
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      nginx.ingress.kubernetes.io/use-regex: "true"
    
    # Хосты
    hosts: []
    
    # Путь
    path: /grafana(/|$)(.*)
    pathType: ImplementationSpecific
    
    # Явно указываем порт сервиса
    servicePort: 80
    
    # TLS (опционально, для продакшена)
    # tls:
    #   - secretName: grafana-tls
    #     hosts:
    #       - grafana.local

# Prometheus настройки
prometheus:
  enabled: true
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        memory: 512Mi
        cpu: 500m
      limits:
        memory: 2Gi
        cpu: 1000m

# Alertmanager
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        memory: 128Mi
        cpu: 100m

# Node Exporter для метрик нод
prometheus-node-exporter:
  enabled: true

# Kube-state-metrics для метрик кластера
kube-state-metrics:
  enabled: true