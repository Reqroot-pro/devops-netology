name: Build and Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'diploma-yandex-project/**'
  workflow_dispatch:

env:
  REGISTRY: cr.yandex
  REPOSITORY_ID: crpnhqbrs0u7vn097bu7
  IMAGE_NAME: my-app
  CLUSTER_ID: catsekbq73ah2rp5dvuv
  PROJECT_DIR: diploma-yandex-project
  # ✅ Полный путь к yc CLI (универсально для всех раннеров)
  YC_PATH: ${{ runner.home }}/.yandex-cloud/bin

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install YC CLI
      run: |
        curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
        # Экспортируем PATH для текущей сессии
        echo "$YC_PATH" >> $GITHUB_PATH
        echo "PATH=$YC_PATH:$PATH" >> $GITHUB_ENV

    - name: Verify YC CLI
      run: $YC_PATH/yc --version

    - name: Authorize in Yandex Cloud
      run: |
        echo "${{ secrets.YC_SERVICE_ACCOUNT_KEY }}" | base64 -d > sa-key.json
        $YC_PATH/yc config set service-account-key sa-key.json
        $YC_PATH/yc config set folder-id ${{ secrets.YC_FOLDER_ID }}
        $YC_PATH/yc cr configure-docker
        rm -f sa-key.json
      env:
        YC_PATH: ${{ env.YC_PATH }}

    - name: Build and Push Docker Image
      run: |
        docker build -t $REGISTRY/$REPOSITORY_ID/$IMAGE_NAME:${{ github.sha }} \
                     -t $REGISTRY/$REPOSITORY_ID/$IMAGE_NAME:latest \
                     ./$PROJECT_DIR/app
        docker push $REGISTRY/$REPOSITORY_ID/$IMAGE_NAME:${{ github.sha }}
        docker push $REGISTRY/$REPOSITORY_ID/$IMAGE_NAME:latest

    - name: Deploy to Kubernetes
      run: |
        $YC_PATH/yc managed-kubernetes cluster get-credentials \
          --id ${{ env.CLUSTER_ID }} \
          --external \
          --force
        kubectl apply -f ./$PROJECT_DIR/k8s-configs/app/deployment.yaml
        kubectl rollout status deployment/my-app -n app --timeout=300s
      env:
        YC_PATH: ${{ env.YC_PATH }}