name: Build and Deploy

on:
  push:
    branches:
      - main
    tags: ['v*']
    paths:
      - 'diploma-yandex-project/**'
      - '!diploma-yandex-project/**/*.md'
      - '!diploma-yandex-project/.gitignore'
      - '!diploma-yandex-project/LICENSE'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  REGISTRY: cr.yandex
  REPOSITORY_ID: crpjdcinl42hhu1djf3m
  IMAGE_NAME: my-app
  CLUSTER_ID: cat105ev716qp55c4ool
  PROJECT_DIR: diploma-yandex-project

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install YC CLI
        run: |
          curl -fsSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i $HOME/yc
          echo "$HOME/yc/bin" >> $GITHUB_PATH

      - name: Авторизация в Яндекс Облаке
        run: |
          export PATH="$HOME/yc/bin:$PATH"
          echo "${{ secrets.YC_SERVICE_ACCOUNT_KEY }}" | base64 -d > sa-key.json
          yc config set service-account-key sa-key.json
          yc config set folder-id ${{ secrets.YC_FOLDER_ID }}
          rm -f sa-key.json

      - name: Login to Yandex Container Registry
        run: |
          export PATH="$HOME/yc/bin:$PATH"
          yc container registry configure-docker

      - name: Build Docker image
        run: |
          docker build \
            -t $REGISTRY/$REPOSITORY_ID/$IMAGE_NAME:${{ github.sha }} \
            -t $REGISTRY/$REPOSITORY_ID/$IMAGE_NAME:latest \
            ./$PROJECT_DIR/app

      - name: Push Docker image
        run: |
          docker push $REGISTRY/$REPOSITORY_ID/$IMAGE_NAME:${{ github.sha }}
          docker push $REGISTRY/$REPOSITORY_ID/$IMAGE_NAME:latest

      - name: Get Kubernetes credentials
        run: |
          export PATH="$HOME/yc/bin:$PATH"
          yc managed-kubernetes cluster get-credentials \
            --id $CLUSTER_ID \
            --external \
            --force

      - name: Deploy to Kubernetes
        run: |
          # 1. Создаём namespace
          kubectl create namespace app --dry-run=client -o yaml | kubectl apply -f -
          
          # 2. Определяем тег образа: если пуш тега (v*) — используем его, иначе latest
          if [[ "${{ github.ref }}" =~ ^refs/tags/ ]]; then
            IMAGE_TAG="${{ github.ref_name }}"
            echo "Deploying tagged version: $IMAGE_TAG"
          else
            IMAGE_TAG="latest"
            echo "Deploying latest from main branch"
          fi
          
          # 3. Применяем все конфигурации приложения (deployment, service, ingress)
          kubectl apply -f ./$PROJECT_DIR/k8s-configs/app/
          
          # 4. Обновляем образ в деплойменте с правильным тегом
          kubectl set image deployment/my-app \
            nginx=${{ env.REGISTRY }}/${{ env.REPOSITORY_ID }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG \
            -n app
          
          # 5. Ждём завершения обновления подов
          kubectl rollout status deployment/my-app -n app --timeout=300s
          
          # 6. Логируем результат
          echo "Deployment completed with image tag: $IMAGE_TAG"
          kubectl get pods -n app -l app=my-app -o wide