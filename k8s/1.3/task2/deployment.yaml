apiVersion: apps/v1
kind: Deployment
metadata:
  name: task2-nginx
  labels:
    app: task2-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task2-nginx
  template:
    metadata:
      labels:
        app: task2-nginx
    spec:
      initContainers:
      - name: init-check-service
        image: busybox
        command: ['sh', '-c', 'until nslookup task2-service.default.svc.cluster.local; do echo waiting for service; sleep 2; done']
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80